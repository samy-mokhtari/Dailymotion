# ------------------------------------------------------------------------------
# docker-compose.yml
#
# Purpose
# - Local development orchestration for the project.
# - Provide a reproducible way to run required services (DB, cache, queues, etc.)
#   without installing them globally on the host machine.
#
# How this file is used
# - Developers run: `docker compose up -d` to start dependencies.
# - CI may validate the configuration via: `docker compose config -q`.
#
# Notes
# - This file is intentionally minimal in the template.
# - Add services as the project evolves (e.g., postgres, redis, backend, frontend).
# - Keep secrets out of this file; prefer environment variables and/or .env files
#   (which should be gitignored if they contain sensitive values).
# ------------------------------------------------------------------------------
services:
  postgres:
    image: postgres:16
    container_name: moderation_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - moderation_network
  redis:
    image: redis:7
    container_name: moderation_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - moderation_network
  moderation_api:
    build:
      context: ./services/moderation_api
    container_name: moderation_api
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${MODERATION_API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - moderation_network
  proxy_api:
    build:
      context: ./services/proxy_api
    container_name: proxy_api
    environment:
      REDIS_URL: ${REDIS_URL}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${PROXY_API_PORT}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - moderation_network
volumes:
  postgres_data:

networks:
  moderation_network:
    driver: bridge
